apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: main

helmGlobals:
  chartHome: ../../../_source/apps

helmCharts:
  - name: app1
    releaseName: app1
    valuesFile: values.yaml
    namespace: main

labels:
  - includeSelectors: false
    pairs:
      app: app1
      environment: production
      branch: main
