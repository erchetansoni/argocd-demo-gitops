apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: branch-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - git:
        repoURL: https://github.com/erchetansoni/argocd-demo-gitops.git
        revision: HEAD
        directories:
          - path: environments/*

  template:
    metadata:
      name: 'env-{{ .path.basename }}'
      labels:
        branch: '{{ .path.basename }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/erchetansoni/argocd-demo-gitops.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
        kustomize: {}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .path.basename }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
